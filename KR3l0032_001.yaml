body:
  text: 歸田録卷上宋歐陽修撰太祖皇帝初幸相國寺至佛像前燒香問當拜與不拜僧録贊寧奏曰不拜問其何故對曰見在佛不拜過去佛贊寧者頗知書有口辨其語雖類俳優然適會上意故微笑而頷之遂以為定制至今行幸焚香皆不拜也議者以為得體開寶寺塔在京師諸塔中最高而制度甚精都料匠預浩所造也塔初成望之不正而勢傾西北人怪而問之浩曰京師地平無山而多西北風吹之不百年當正也其用心之精蓋如此國朝以來木工一人而已至今木工皆以預都料為法有木經三卷行於世世傳浩惟一女年十餘嵗每卧則交手於胸為結構狀如此踰年撰成木經三卷今行於世者是也國朝之制知制誥必先試而後命有國以來百年不試而命者才三人陳堯佐楊億及修忝與其一爾仁宗在東宫魯肅簡公宗道為諭德其居在宋門外俗謂之浴堂巷有酒肆在其側號仁和酒有名於京師公往往易服一作衣微行飲於其中一日真宗急召公將有所問使者及門而公不在移時乃自仁和肆中飲歸中使遽先入白乃與公約曰上若怪公來遲當託何事以對幸先見教冀不異同公曰但以實告中使曰然則當得罪公曰飲酒人之常情欺君臣子之大罪一作罪大也中使嗟歎而去真宗果問使者具如公對真宗問曰一作公何故私入酒家公謝曰臣家貧無器皿酒肆百物具一作俱備賔至如歸適有鄉里親客自遠來遂與之飲然臣既易服市人亦無識臣者真宗笑曰卿為宫臣恐為御史所彈然自此奇公以為忠實可大用晚年每為章獻明肅太后言羣臣可大用者數人公其一也其後章獻皆用之太宗時親試進士每以先進卷子者賜第一人及第孫何與李庶幾同在科場皆有時名庶幾文思敏速何尤苦思遲會言事者上言舉子輕薄為文不求義理惟以敏速相誇因言庶幾與舉子於餅肆中作賦以一餅熟成一韻者為勝太宗聞之大怒是歲殿試庶幾最先進卷子遽叱出之由是何為第一故參知政事丁公度朝公宗慤往時同在館中喜相諧謔朝因遷職以啓謝丁時丁方為羣牧判官乃戲朝曰啓事更不奉答當以糞墼一車為報朝答曰得墼勝於得啓聞者以為善對石資政中立好諧謔士大夫能道其語者甚多嘗因入朝遇荆王迎授東華門不得入遂自左掖門入有一朝士好事語言問石云何為自左去聲掖門入石方趂班且走且答曰秪為大音拖王迎授聞者無不大笑楊大年方與客棋石自外至坐於一隅大年因誦賈誼鵩賦以戲之云止於坐隅貌甚間暇石遽答曰口不能言請對以臆故老能言五代時事者云馮相道和相凝同在中書一日和問馮曰公靴新買其直幾何馮舉左足示和曰九百和性褊急遽回顧小吏云吾靴何得用一千八百因詬責久之馮徐舉其右足曰此亦九百於是哄堂大笑時謂宰相如此何以鎮服百僚錢副樞若水嘗遇異人傳相法其事甚怪錢公後傳楊大年故世稱此二人有知人之鑒仲簡揚州人也少習明經以貧傭書大年門下大年一見奇之曰子當進士及第官至清顯乃教以詩賦簡天禧中舉進士第一甲及第官至正郎天章閣待制以卒謝希深為奉禮郎大年尤喜其文每見則欣然延接既去則歎息不已鄭天休在公門下見其如此怪而問之大年曰此子官亦清要但年不及中壽爾希深官至兵部員外郎知制誥卒年四十六皆如其言希深初以奉禮郎鎖廳應進士舉以啓事謁見大年有云曳鈴其空上念無君子者解組不顧公其如蒼生何大年自書此四句於扇曰此文中虎也由是知名太祖時郭進為西山巡檢有告其隂通河東劉繼元將有異志者太祖大怒以其誣害忠臣命縛其人豫進使自處置進得而不殺謂曰爾能為我取繼元一城一寨不止贖爾死當請賞爾一官歲餘其人誘其一城來降進具其事送之於朝請賞以官太祖曰爾誣害我忠良此才可贖死耳賞不可得也命以其人還進進復請曰使臣失信則不能用人矣太祖於是賞以一官君臣之間蓋如此魯肅簡公立朝剛正嫉惡少容小人惡之私目為魚頭當章獻垂簾時屢有補益讜言正論士大夫多能道之公既卒太常諡曰剛簡議者不知為美諡以為因諡譏之竟改曰肅簡公與張文節公知白當垂簾之際同在中書二公皆以清節直道為一時名臣而魯尤簡易若曰剛簡尤得其實也宋尚書祁為布衣時未為人知孫宣公奭一見奇之遂為知己後宋舉進士驟有時名故世稱宣公知人公嘗語其一無此字門下客曰近世諡為兩字而文臣必諡為文皆非古也吾死得諡曰宣若戴足矣及公之卒宋方為禮官遂諡曰宣成其志也嘉祐二年樞密使田公况罷為尚書右丞觀文殿學士兼翰林侍讀學士罷樞密使當降麻而止以制除蓋往時髙若訥罷樞密使所除官職正與田公同亦不降麻遂以為故事真宗時丁晉公謂自平江軍節度使除兵部尚書參知政事節度使當降麻而朝議惜之遂止以制除近者陳相執中罷使相降僕射乃降麻龎籍罷節度使除觀文殿大學士又不降麻蓋無定制也寶元康定之間余自貶所還過京師見王君貺初作舍人自契丹使歸余時在坐見都知押班殿前馬步軍聨騎立門外呈榜子稱不敢求見舍人遣人謝之而去至一無此字慶厯三年余作舍人呵引者即斂馬駐立前呵者傳聲太尉立馬急遣人謝之比舍人馬過然後敢行後豫官於外十年而還遂入翰林為學士見三衙呵引甚雄不復如當時與學士相逢分道而過更無斂避之禮蓋兩制漸輕而三衙漸重舊制侍衛親軍與殿前分為兩司自侍衛司不置馬步軍都指揮使止置馬軍指揮使步軍指揮使一止作馬步軍指揮使以來侍衛一司自分為二故與殿前司列為三衙也五代軍制已無典法而今又非其舊制者多矣國家開寶中所鑄錢文曰宋通元寶至寶元中則曰皇宋通寶近世錢文皆著年號惟此二錢不然者以年號有寶字文不可重故也太祖建隆六年將議改元語宰相勿用前世舊號於是改元乾德其後因於禁中見內人鏡背有乾德之號以問學士陶榖榖曰此偽蜀時年號也因問內人乃是故蜀王時人太祖由是益重儒士而歎宰相一有之字寡聞也仁宗即位改元天聖時章獻明肅太后臨朝稱制議者謂撰號者取天字於文為二人以為二人聖者悅太后爾至九年改元明道又以為明字於文日月並也與二人旨同無何以犯契丹諱明年遽一作遂改曰景祐是時連嵗天下大旱改元詔意冀以迎和氣也五年因郊又改元曰寶元自景祐初羣臣慕唐玄宗以開元加尊號遂請加景祐於尊號之上至寶元亦然是歲趙元昊以河西叛改姓元氏朝廷惡之遽改元曰康定而不復加於尊號而好事者又曰康定乃諡爾明年又改曰慶厯至九年大旱河北尤甚民死者十八九於是又改元曰皇祐猶景祐也六年日蝕四月朔以為正陽之月自古所忌又改元曰至和三年仁宗不豫久之康復又改元曰嘉祐自天聖至此凡年號九皆有為也冦忠愍公凖之貶也初以列卿知安州既而又貶衡州副使又貶道州别駕遂貶雷州司户時丁晉公與馮相拯在中書丁當秉筆初欲貶崖州而丁忽自疑語馮曰崖州再涉鯨波如何馮唯唯而已丁乃徐擬雷州及丁之貶也馮遂擬崖州當時好事者相語曰若見雷州冦司户人生何處不相逢比丁之南也冦復移道州冦聞丁當來遣人以蒸羊逆於一作迎於境上而收其僮僕杜門不放出聞者多以一作公為得體楊文公億以文章擅天下然性特剛徑寡合有惡之者以事譛之大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文藁數篋以示大年云卿識朕書迹乎皆朕自起草未嘗命臣下代作也大年惶恐不知所對頓首再拜而出乃知必為人所譛矣由是佯狂奔於陽翟真宗好文初待大年眷顧無比晚年恩禮漸衰亦由此也王文正公曾為人方正持重在中書最為賢相嘗謂大臣執政不當收恩避怨公嘗語尹師魯曰恩欲歸己怨使誰當聞者歎服以為名言李文靖公沆為相沉正厚重有大臣體嘗曰吾為相無他能唯不改朝廷法制用此以報國士大夫初聞此言以為不切於事及其後當國者或不思事體或收恩取譽屢更祖宗舊制遂至官兵冗濫不可勝紀而用度無節財用一作力匱乏公私困弊推迹其事皆因執政不能遵守舊規妄有更改一作改更所致至此始知公言簡而得其要由是服其識慮之精陶尚書穀為學士嘗晚召對太祖御便殿陶至望見上將前而復却者數四左右催宣甚急榖終倣徨不進太祖笑曰此措大索事分顧左右取袍帶來上已束帶榖遽趨入薛簡肅公奎知開封府時明參政鎬為府曹官簡肅待之甚厚直以公輔期之其後公守秦益常辟以自隨優禮特異有問於公何以知其必貴者公曰其為人端肅其言簡而理盡凡人簡重則尊嚴此貴臣相也其後果至參知政事以卒時皆服公知人臘茶出一作盛於劔建草茶盛於兩浙兩浙之品日注為第一自景祐以後洪州雙井白芽漸盛近歲製作尤精囊以紅紗不過一二兩以常茶十數斤養之用辟暑濕之氣其品逺出日注上遂為草茶第一仁宗退朝常命侍臣講讀於邇英閣賈侍中昌朝時為侍講講春秋左氏傳每至諸侯淫亂事則略而不説上問其故賈以實對上曰六經載此所以為後王鑒一作監戒何必諱丁晉公自保信軍節度使知江寧府召為參知政事中書以丁節度使召學士草麻時盛文肅為學士以為參知政事合用舍人草制遂以制除丁甚恨之冦忠愍之貶所素厚者九二字一作之人自盛文肅度以下皆坐斥逐而楊大年與冦公尤善丁晉公憐其才曲保全之議者謂丁所貶朝士甚多獨於大年能全之大臣愛才一節可稱也太祖時以李漢超為關南巡檢使捍北敵與兵三千而已然其齊州賦稅最多乃以為齊州防禦使悉與一州之賦俾之養士而漢超武人所為多不法久之關南百姓詣闕訟漢超貸民錢不還及掠其女以為妾太祖召百姓入見便殿賜以酒食慰勞之徐問曰自漢超在關南契丹南侵者幾百姓二字一作對曰無也太祖曰往時契丹南侵邊將不能禦河北之民歲邅劫虜汝於此時能保全其資財婦女乎今漢超所取孰與契丹之多又問訟女者曰汝家幾女所嫁何人百姓具以對太祖曰然則所嫁皆村夫也若漢超者吾之貴臣也以愛汝女則取之得之必不使失所與其嫁村夫孰若處漢超家富貴於是百姓皆感悅而去太祖使人語漢超曰汝須錢何不告我而取於民乎乃賜以銀數百兩曰汝自還之使其感汝也漢超感泣誓以死報仁宗萬幾之暇無所玩好惟親翰墨而飛白尤為神妙凡飛白以點畫象形物而點最難工至和中有書待詔李唐卿撰飛白三百點以進自謂窮盡物象上亦頗佳之乃特為清淨二字以賜之其六點尤為奇絶又出三百點外仁宗聖性恭儉至和二年春不豫兩府大臣日至寢閣問聖體見上器服簡質用素漆唾壺盂子素瓷盞進藥御榻上衾褥皆黃絁色已故暗宫人遽取新衾覆其上亦黃絁也然外人無知者惟兩府侍疾因一作因侍疾見之爾陳康肅公堯咨善射當世無雙公亦以此自矜嘗射於家圃有賣油翁釋擔而立睨之久而不去見其發矢十中八九但微頷之康肅問曰汝亦知射乎吾射不亦精乎翁曰無他但手熟爾康肅忿然曰爾安敢輕吾射翁曰以我酌油知之乃取一葫蘆置於地以錢覆其口徐以杓酌油瀝之自錢孔入而一作而入錢不濕因曰我亦無他惟手熟爾康肅笑而遣之此與莊生所謂解牛斫輪者何異至和初陳恭公罷相而並用文富二公彥博弼正衙宣麻之際上遣小黃門一有三輩二字密於百官班中聽其論議而二公久有人望一旦復用朝士往往相賀黃門具奏上大悅余時為學士後數日奏事垂拱殿上問新除彥博等外議如何余以朝士相賀為對上曰自古二字一作古者人君用人或以夢卜茍不知人當從人望夢卜豈足慿耶故余作文公批答云永惟商周之所記至以夢卜而求賢孰若用縉紳之公言從中外之人望者具述上語也王元之在翰林嘗草夏州李繼遷制繼遷送潤筆物數倍於常然用啓頭書送一作遂拒而不納蓋惜事體也近時舍人院草制有送潤筆物稍後時者必遣院子詣門催索而當送者往往不送相承既久今索者送者皆恬然不以為怪也內中舊有玉石三清真像初在真遊殿既而大內火遂遷至玉清昭應宮已而玉清又大火又遷於洞真洞真又火又遷於上清上清又火皆焚蕩無孑遺遂一有又字遷於景靈而宮司道官相與惶恐上言真像所至輒火景靈必不免願遷二字一作乞移他所遂遷於集禧宮迎祥池水心殿而都人謂之行火真君也丁文簡公度罷參知政事為紫宸殿學士即文明殿學士也文明本有大學士為宰相兼職又有學士為諸學士之首後以文明者真宗諡號也遂更曰紫宸近世學士皆以殿名為官稱如端明資政是也丁既受命遂稱曰丁紫宸議者又謂紫宸之號非人臣之所宜稱遽更曰觀文觀文是隋煬帝殿名理宜避之蓋當時不知然則朝廷之事一作士不可以不學也王冀公欽若罷參知政事而真宗眷遇之意未衰特置資政殿學士以寵之時冦萊公在中書定其班位依雜學士在翰林學士下冀公因訴於上曰臣自學士拜參知政事今無罪而罷班反在下是貶也真宗為特加一作置大學士班在翰林學士上其寵遇如此景祐中有郎官皮仲容者偶出街衢為一輕浮子所戲遽前賀云聞君有臺憲之命仲容立馬愧謝久之徐問其何以知之對曰今新制臺官必用稀姓者故以君姓知之爾蓋是時三院御史乃仲簡論程掌禹錫也聞者傳以為笑太宗時宋白賈黃中李至呂蒙正蘇易簡五人同時拜翰林學士承旨扈蒙贈之以詩云五鳳齊飛入翰林其後呂蒙正為一作至宰相賈黃中李至蘇易簡皆至參知政事宋白官至尚書老於承旨皆為名臣御史臺故事三院御史言事必先白中丞自一有中山二字劉子儀為中丞始榜臺中今後御史有所言不須先白中丞雜端至今如此丁晉公之南遷也行過潭州自作齋僧疏一有文字云補仲山之衮雖曲盡於巧心和傅説之羮實難調於衆口其少以文稱晚年詩筆尤精在海南篇詠尤多如草解忘憂憂底事花名含笑笑何人一有之句二字尤為人所傳誦張僕射齊賢體質豐大飲食過人尤嗜肥豬肉每食數斤天夀院風藥黑神丸常人所服不過一彈丸公常以五七兩為一大劑夾以胡餅而頓食之淳化中罷相知安州安陸山郡未嘗識逹官見公飲啖不類常人舉郡驚駭嘗與賔客會食厨吏置一金漆大桶於廳側窺一作竊視公所食如其物投桶中至暮酒漿浸漬漲溢滿桶郡人嗟愕以為享富貴者必有異於人也然而晏元獻公清瘦如削其飲食甚微每析半餅以筯捲之抽去其筯內捻頭一莖而食一有之字此亦異於常一無此字人也宋宣獻公綬夏英公竦同試童行誦經有一行者誦法華經不過問其習業幾年矣曰十年矣二公笑且閔之因各取法華經一部誦之宋公十一作五日夏公七日不復遺一字人性之相遠一有也字如此樞密曹侍中利用澶淵之役以殿直使於契丹議定盟好由是進用當章獻明肅太后時以勳舊自處權傾中外雖太后亦嚴憚之但呼侍中而不名凡內降恩澤皆執不行然以其所執既多故有三執而又降出者一無此字則不得已而行之久之為小人一有之字所測凡有求而三降不行者必又請之太后曰侍中已不行矣請者徐啓曰臣已告得侍中宅妳婆或其親信為言之許矣於是又降出曹莫知其然也但以三執不能已黽俯行之於是太后大怒自此切齒遂及曹芮之禍乃知大臣功髙而權盛禍患之來非智慮所能防也曹侍中在樞府務革僥幸而中官尤被裁抑羅崇勳時為供奉官監後苑作歲滿敘勞過求恩賞內中唐􅊳不已莊獻太后怒之簾前諭曹使召而戒勵曹歸院坐廳事召崇勳立庭中去其巾𢃄困辱久之乃取狀以聞崇勳不勝其耻其後曹芮事作鎮州急奏言芮反狀仁宗太后大驚崇勳適在側因自請行既受命喜見顔色晝夜疾馳鍊成其獄芮既被誅曹初貶隨州再貶房州行至襄陽渡北津監造內臣楊懷敏指江水謂曹曰侍中好一江水蓋欲其自投也再三言之曹不諭至襄陽驛遂逼其自縊宋鄭公庠初名郊字伯庠與其弟祁自布衣時名動天下號為二宋其為知制誥仁宗驟加奬眷便欲大用有忌其先進者譛之謂其姓符國號名應郊天又曰郊者交也交者替代之名也宋交其言不祥仁宗遽命改之公怏怏不獲已乃改為庠字公序公後更踐二府二十餘年以司空致仕兼享福壽而一作以終而譛者竟不見用以卒可以為小人之戒也曹武惠王彬國朝名將勳業之盛無與為比嘗曰自吾為將殺人多矣然未嘗以私喜怒輒戮一人其所居堂室敝壞子弟請加修葺公曰時方大冬墻壁瓦石之間百蟲所蟄不可傷其生其仁心愛物蓋如此既平江南回詣閣門入見榜子稱奉勑江南勾當公事回其謙恭不伐又如此真宗好文雖以文辭取士然必視其器識每御崇政賜進士及第必召其髙第三四人並列於庭更察其形神磊落者始賜第一人及第或取其所試文辭有理趣者徐奭鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重遂以為第一蔡齊置器賦云安天下於覆盂其功可大遂以為第一人錢思公生長富貴而性儉約閨門用度為法甚謹子弟輩非時不能輒取一錢公有一珊瑚筆格平生尤所珍惜常置之几案子弟有欲錢者輒竊而藏之公即悵然自失乃榜於家庭以錢十千贖一作購之居一二日子弟佯為求得以獻公欣然以十千賜之他日有欲錢者又竊去一歲中率五七如此公終不悟也余官西都在公幕親見之每與同僚歎公之純德也國朝雅樂即用王朴所製周樂太祖時和峴以為聲髙遂下其一律然至今言樂者猶以為髙云今黃鍾乃古夾鍾也景祐中李照作新二字一作所作樂又下其聲太常歌工以其一作為太濁歌不成聲當鑄鐘時乃私賂鑄匠使減其銅齊而聲稍清歌乃叶而成聲而照竟不知以此知審音作樂之難也照每謂人曰聲高則急促下則舒緩吾樂之作久而可使人心感之皆舒和而人物之生亦當豐大王侍讀洙身尤短小常戲之曰君樂之成能使我長一有大字乎聞者以為笑而樂成竟不用鄧州花蠟燭名著天下雖京師不能造相傳云一作亦是冦萊公燭法公嘗知鄧州而自少年富貴不點油燈尤好夜宴劇飲雖寢室亦燃燭逹旦每罷官去後人至官舍見厠溷間燭淚在地往往成堆杜祁公為人清儉在官未嘗燃官燭油燈一炷熒然欲滅與客相對清談而已二公皆為名臣而奢儉不同如此然祁公壽考終吉萊公晚有南遷之禍遂歿不返雖其不幸亦可以為戒也故事學士在內中院吏朱衣雙引太祖朝李昉為學士太宗在南衙朱衣一人前引而已昉一有因字亦去其一人至今如此往時學士入劄子不著姓但云學士臣某先朝盛度丁度並為學士遂著姓以别之其後遂皆著姓晏元獻公以文章名譽少年居富貴性豪俊所至延賔客一時名士多出其門罷樞密副使為南京留守時年三十八幕下王琪張亢最為上客亢體肥大琪目為牛琪瘦骨立亢目為猴二人以此自相譏誚琪嘗嘲亢曰張亢觸墻成八字亢應聲曰王琪望月呌三聲一坐為之大笑楊文公嘗戒其門人為文宜避俗語既而公因作表云伏惟陛下德邁九皇門人鄭戩遽請於公曰未審何時得賣生萊於是公為之大笑而易之夏英公竦父官於河北景德中契丹犯河北遂殁於陳後公為舍人丁母憂起復奉使契丹公辭不行其表云父殁王事身丁母憂義不戴天難下穹廬之拜禮當枕塊忍聞夷樂之聲當時以為一作謂四六偶對最為精絶孫何孫僅俱以能文馳名一時僅為陜西轉運使作驪山詩二篇其後篇有云秦帝墓成陳勝起明皇宮就祿山來時方建玉清昭應宮有惡僅者欲中傷之因録其詩以進真宗讀前篇云朱衣吏引上驪山遽曰僅小器也此何足誇遂棄不讀而陳勝祿山之語卒得不一作不得聞人以為幸也楊大年每欲一作遇作文則與門人賔客飲博投壺奕棋二字一作乃至語笑喧譁而不妨搆思以小方紙細書揮翰如飛文不加點每盈一幅則命門人傳録門人疲於應命頃刻之際成數千言真一代之文豪也楊大年為學士時草答契丹書云鄰壤交歡進草既入真宗自注其側云朽壤鼠壤糞壤大年遽改為鄰境明旦引唐故事學士作文書有所改為不稱職當罷因亟求解職真宗語宰相曰楊億不通商量真有氣性一作性氣太常所用王朴樂編鐘皆不圓而側垂自李照胡瑗之徒皆以為非及照作新樂將鑄編鐘給銅一有於字鑄㵼務得古編鐘一枚工人不敢銷毁遂藏於太常鐘不知何代所作其銘曰一作云粵朕皇祖寶和鐘粵斯萬年子子孫孫永寶用叩其聲與王朴夷則清聲合而其形不圓一有而字側垂正與朴鐘同然後知朴博古好學不為無據也其後胡瑗改鑄編鐘遂圓其形而下垂叩之掩鬱而不揚其鎛鐘又長甬而震掉其聲不和著作佐郎劉羲叟竊謂人曰此與周景王無射鐘無異必有眩惑之疾未幾仁宗得疾人以羲叟之言驗矣其樂亦尋廢一有不用二字自太宗崇奬儒學驟擢髙科至輔弼者多矣蓋一作自太平興國二年至天聖八年二十三榜由呂文穆公蒙正而下大用二十七一作五人而三人並登兩府惟天聖五年一榜而已是歲王文安公堯臣第一今昭文相公韓僕射琦西廳參政趙侍郎槩第二第三人也豫忝與二公同府每見語此以為科場盛事自景祐元年已後至今治平三年三十餘年十二榜五人已上未有一人登兩府者亦可怪也歸田録卷上
