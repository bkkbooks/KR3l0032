body:
  text: 歸田録小說家類一雜事之屬提要臣等謹案歸田録二卷宋歐陽修撰多記朝廷軼事及士大夫談諧之言自序謂以唐李肇國史補為法而小異於肇者不書人之過惡陳氏書録解題曰或言公為此録未成而序先出裕陵索之其中本載時事及所經厯見聞不敢以進旋為此本而初本竟不復出王明清揮麈三録則曰歐陽公歸田録初成未出而序先傳神宗見之遽命中使宣取時公已致仕在潁州因其間所記有未欲廣布者因盡刪去之又惡大少則雜記戲笑不急之事以充滿其卷帙既繕寫進入而舊本亦不敢存二說小異周輝清波雜志所記與明清之說同惟云原本亦嘗出與明清說又不合大抵初藁為一本宣進者又一本實有此事其旋為之說與刪除之說則傳聞異詞耳惟修歸潁上在神宗時而録中稱仁宗立今上為皇子則似英宗時事語或平時劄記歸田後乃排纂成之偶忘追改歟其中不試而知制誥一條稱宋惟楊億陳堯叟及修三人費衮梁溪漫志舉真宗至道三年四月以梁周翰夙負詞名今加奬擢亦不試而知制誥實在楊億之前紏修誤記是偶然疏舛亦所不免然大致可資考據亦國史補之亞也乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:93363f17d9d81d68edc0b037f1c755c26ad49b32e53f4beb647fb3675212655a
