body:
  text: 歸田録卷下宋歐陽修撰真宗朝歲歲賞花釣魚羣臣應制嘗一歲臨池久之而御釣不食時丁晉公謂應制詩云鶯驚鳳輦穿花去魚畏龍顔上釣遲真宗稱賞羣臣皆自以為不及也趙元昊二子長曰佞令受次曰諒祚諒祚之母尼也有色而寵佞令受母子怨望而諒祚母之兄曰沒藏訛嚨者亦黠虜也因教佞令受以弒逆之謀元昊已見殺訛嚨遂以弒逆之罪誅佞令受子母而諒祚乃得立而年甚幼訛嚨遂專夏國之政其後諒祚稍長卒殺訛嚨滅其族元昊為西鄙患者十餘年國家困天下之力有事於一方而敗軍殺將不可勝數然未嘗少挫其鋒及其困於女色禍生父子之間以亡其身此自古賢智之君或不能免况中人乎訛嚨教人之子殺其父以為己利而卒亦滅族皆理之然也晏元獻公善評詩嘗曰老覺腰金重慵便枕玉涼未是富貴語不如笙歌歸院落燈火下樓臺此善言富貴者也人皆以為知言契丹阿保機當唐末五代時最盛開平中屢遣使聘梁梁亦遣人報聘今世傳一有學士二字李琪金門集有賜契丹詔乃為阿布機當時書詔不應有誤而自五代以來見於他書者皆為阿保機雖今契丹之人自謂之阿保機亦不應有失又有趙志忠者本華人也自幼陷敵為人明敏在敵中舉進士至顯官既而脫身歸國能述敵中君臣世次山川風物甚詳又云阿保機遼人實謂之阿保謹未一作莫知孰是一作也字此聖人所以慎於傳疑也真宗尤重儒學今科場條制皆當時所定至今每親試進士已放及第自十人已上御試卷子並録本於真宗影殿前焚燒制舉登科者亦然近時名畫李成巨然山水包鼎虎趙昌花果成官至尚書郎其山水寒林往往人家有之巨然之筆惟學士院玉堂北壁獨存人間不復見也包氏宣州人世以畫虎名家而鼎最為妙今子孫猶以畫虎為業而曾不得其髣佛也昌花寫生逼真而筆法軟俗一作劣殊無古人格致然時亦未有其比一作未有過此者冦萊公在中書與同列戲云水底日為天上日未有對而會楊大年適來白事因請其對大年應聲曰眼中人是面前人一坐稱為的對朝廷之制有因偶出一時而遂為故事者契丹人使見辭賜宴雜學士員雖多皆赴坐惟翰林學士祗召當直一員一作人餘皆不赴諸王宫教授入謝祖宗時偶因便殿不御袍帶見之至今教授入謝必俟上入內解袍帶復出見之有司皆以為定制也處士林逋居於杭州西湖之孤山逋工筆畫善為詩如草泥行郭索雲木呌鈎輈頗為士大夫所稱又梅花詩云踈影橫斜水清淺暗香浮動月黃昏評一作能詩者謂前世詠梅者多矣未有此句也又其臨終為句云茂陵他日求遺藁猶喜曾無封禪書尤為人稱一作傳誦自逋之卒湖山寂寥一作寞未有繼者俚諺云趙老送燈臺一去更不來不知是何等語雖士大夫一作君子亦往往道之天聖中有尚書郎趙世長者常以滑稽自負其老也求為西京留臺御史有輕薄子送以詩云此回真是送燈臺世長深惡之亦以不能酬酢為恨其後竟卒於留臺也官制一作稱廢久矣今其名稱訛謬者多雖士大夫皆從俗不以為怪皇女為公主其夫必拜駙馬都尉故謂之駙馬宗室女封郡主者謂其夫為郡馬縣主者為縣馬不知何義也唐制三衛官有司階司戈執干執戟謂之四色官今三衛廢無官屬惟金吾有一人每日於正衙放朝唱不坐直謂之四色官尤可笑也京師諸司庫務皆由三司舉官監掌而權貴之家子弟親戚因緣請託不可勝數為三司使者常以為患田元均為人寬厚長者其在三司深厭干請者雖不肯從然不欲峻拒之每溫顔強笑以遣之嘗謂人曰作三司使數年強笑多矣直笑得面似靴皮士大夫聞者傳以為笑然皆服其德量也茶之品莫貴於龍鳳謂之團茶凡八餅重一斤慶厯中蔡君謨為福建路轉運使始造小片龍茶以進其品絶精一作精絶謂之小團凡二十餅重一斤其價直金二兩然金可有而茶不可得每因南郊致齋中書樞密院各賜一餅四人分之宫人往往縷一作覆金花於其上蓋其貴重如此太宗時有待詔賈玄以棋供奉號為國手邇來數十年未有繼者近時有李憨子者頗為人所稱云舉世無敵手然其人狀貌昏濁垢穢不可近蓋里巷庸人也不足置之樽爼間故胡旦嘗語人曰以棋為易解則如旦聰明尚或不能以為難解則愚下小人往往造於精絶信如其言也王副樞疇之夫人梅鼎臣之女也景彜初除樞密副使梅夫人入謝慈壽宫太后問夫人誰家子對曰梅鼎臣女也太后笑曰是梅聖俞家乎由是始知聖俞名聞於宫禁也聖俞在時家甚貧余或至其家飲酒甚醇非常人家所有問其所得云皇親有好學者宛轉致之余又聞皇親有以錢數千購梅詩一篇者其名重於時如此錢思公雖生長富貴而少所嗜好在西洛時嘗語僚屬言平生惟好讀書坐則讀經史卧則讀小説上厠則閲小辭蓋未嘗頃刻釋卷也謝希深亦言宋公垂同在史院每走厠必挾書以往諷誦之聲琅然聞於遠近其篤學如此余因謂希深曰余平生所作文章多在三上乃馬上枕上厠上也蓋惟此尤可以屬思爾國朝宰相最少年者惟王溥罷相時父母皆在人以為榮今富丞相弼入中書時年五十二太夫人在堂康強後三年太夫人薨有司議贈恤之典云無見任宰相丁憂例是歲三月十七日春宴百司已具前一夕有旨富某母喪在殯特罷宴此事亦前世未有皇祐二年嘉祐七年季秋大享皆以大慶殿為明堂蓋明堂者路寢也方於寓祭圜丘斯為近禮明堂額御以金填字門牌亦御飛白皆皇祐中所書宸翰雄偉勢若飛動余詩云寶墨飛雲動輝金中日晶者謂二牌也錢思公官兼將相階勳品皆第一自云平生不足者不得於黃紙書名每以為恨也三班院所領使臣八十餘人涖事於外其罷而在院者常數百人每歲乾元節醵錢飯僧進香合以祝聖壽謂之香錢判院官常利其餘以為餐錢羣牧司領內外坊監使副判官比他司俸入最優又歲收糞墼錢頗多以充公用故京師謂之語曰三班喫香羣牧喫糞咸平五年南省試進士有教無類賦王沂公為第一賦盛行於世其警句有云神龍異稟猶嗜欲之可求纎草何知尚薰蕕而相假時有輕薄子擬作四句云相國寺前熊翻筋斗望春門外驢舞柘枝議者以為言雖鄙俚亦著題也國朝之制自學士已上賜金𢃄者例不佩魚若奉使契丹及館伴比使則佩事已復去之惟兩府之臣則賜佩謂之重金初太宗嘗曰玉不離石犀不離角可貴者惟金也乃創為金銙之制以賜羣臣方團毬路以賜兩府御􅋖花以賜學士以上今俗謂毬路為笏頭御􅋖花為荔枝皆失其本號也宋丞相庠早以文行負重名於時晚年尤精字學嘗手校郭忠恕佩觽三篇寶玩之其在中書堂吏書牒尾以俗體書宋為宋公見之不肯下筆責堂吏曰吾雖不才尚能見姓書名此不是我姓堂吏惶懼改之乃肯書名京師食店賣酸􅜮者皆大出一作書牌榜於通衢而俚俗昧於字法轉酸從食􅜮從臽有滑稽子謂人曰彼家所賣餕􅀈音俊陷不知為何物也飲食四方異宜而名號亦隨時俗言語不同或至傳者傳失其本湯餅唐人謂之不托今俗謂之餺飥矣晉束晳餅賦有饅頭薄持起溲牢九之號惟饅頭至今名存而起溲牢九皆莫曉為何物薄持荀氏又謂之薄夜亦莫知何物也嘉祐八年上元夜賜中書樞密院御宴於相國寺羅漢院國朝之制歲時賜宴多矣自兩制已上皆與惟上元一夕秪賜中書樞密院雖前兩府見任使相皆不得與也是歲昭文韓相一作公集賢曾公樞密張太尉皆在假不赴惟余與西廳趙侍郎槩副樞胡諫議宿吳諫議奎四人在席酒半相顧四人者皆同時翰林學士相繼登二府前此未有也因相與道玉堂舊事為笑樂遂皆引滿劇飲亦一時之盛事也國朝之制大宴樞密使副不坐侍立殿上既而退就御厨賜食與閣門引進四方館使列坐廡下親王一人伴食每春秋賜衣門謝則與內諸司使副班於垂拱殿外廷中而中書則别班謝於門上故朝中為之語曰厨中賜食階下謝衣蓋樞密使唐制以內臣為之故常與內諸司使副為伍自後唐莊宗用郭崇韜與宰相分秉朝政文事出中書武事出樞密自此之後其權漸盛至今一作本朝遂號為兩府事權進用祿賜禮遇與宰相均惟日趨內朝侍宴賜衣等事尚循唐舊其任隆輔弼之崇而雜用內諸司故事使朝廷制度輕重失序蓋沿革異時因循不能釐正也蔡君謨既為余書集古録目序刻石其字尤精徑為世所珍余以鼠鬚栗尾筆銅緑筆格大小龍茶惠山泉等物為潤筆君謨大笑以為太清而不俗後月餘有人遺余以清泉香餅一篋者君謨聞之歎曰香餅來遲使我潤筆獨一作猶無此一種佳一無此字物兹又可笑也清泉地名香餅石炭也用以焚香一餅之火可終日不滅梅聖俞以詩知名三十年終不得一館職晚年與修唐書書成未奏而卒士大夫莫不歎惜其初受勑修唐書語其妻刁氏曰吾之修書可謂猢猻入布袋矣刁氏對曰君於仕宦亦何異鮎魚上竹竿耶聞者皆以為善對一作昔梅聖俞以詩名當世然終不得一官職晚年在唐書局充修書官尚冀書成酬勞得一貼職以償素願書垂就而卒時人莫不歎其奇薄其初修唐書也常竊歎曰吾今可謂猢猻入布袋仁宗初立今上為皇子令中書召學士草詔學士王圭當直詔至中書諭之王曰此大事也必須面奉聖旨於是求對明日面稟得旨乃草詔羣一作諸公皆以王為真得學士體也盛文肅公豐肌一作肥大腹而眉目清秀丁晉公疏瘦如削二公皆兩浙人也並以文辭知名於時梅學士詢在真宗時已為名臣至慶厯中為翰林侍讀以卒性喜焚香其在官舍每晨起將視事必焚香兩爐以公服罩之撮其袖以出坐定撒開兩袖郁然滿室濃香有竇元賔者五代漢宰相正固之孫也以名家子有文行為館職而不喜修飾經時未嘗沐浴故時人為之語曰盛肥丁瘦梅香竇臭也寶元中趙元昊叛命朝廷命將討伐以鄜延環慶涇原秦鳳四路各置經略安撫招討使余以為一作謂四路皆內地也當如故事置靈夏四面行營招討使今自於境內何所招討余因竊料王師必不能出境其後用兵五六年劉平任福葛懷敏三大將皆自戰其地而大敗由是至於罷兵竟不能出師呂文穆公蒙正以寬厚為宰相太宗尤所眷遇有一朝士家藏古鑑自言能照二百里欲因公弟獻以求知其弟伺間從容言之公笑曰吾面不過楪一作鏡子大安用照二百里其弟遂不復敢言聞者歎服以為賢於李衛公遠矣蓋寡好而不為物纍者昔賢之所難也國朝百有餘年年號無過九年者開寶九年改為太平興國太平興國九年改為雍熙大中祥符九年改為天禧慶厯九年改為皇祐嘉祐九年改為治平惟天聖盡九年而十年改為明道唐人奏事非表非狀者謂之榜子亦謂之録子今謂之劄子凡羣臣百司上殿奏事兩制以上非時有所奏陳皆用劄子中書樞密院事有不降宣勑者亦用劄子與兩府自相往來亦然若百司申中書皆用狀惟學士院用咨報其實如劄子亦不書一作出名但當直學士一人押字而已謂之咨報今俗謂草書名謂押字也此唐學士舊規也唐世學士院故事近時隳廢殆盡惟此一事在爾燕王元儼太宗幼子也太宗子八人真宗朝六人一無此字已亡殁至仁宗即位獨燕王在以皇叔之親特見尊禮契丹亦畏其名其疾亟時仁宗幸其宫親為調藥平生未嘗語朝政遺言一二事皆切於理余時知制誥所作贈官制所載皆其實事也華元郡王允良燕王子也性好晝睡每自旦酣寢至暮始興盥一作頮濯櫛潄衣冠而出燃燈燭治家事飲食宴樂逹旦而罷則復寢以終日無日不如此由是一宫之人皆晝睡夕興允良不甚喜聲色亦不為他驕恣惟以夜為晝亦其性之異前世所未有也故觀察使劉從廣燕王壻也嘗語余燕王好坐木馬子坐則不下或飢則便就其上飲食往往乘興奏樂於前酣飲終日亦其性之異也皇子皓封東陽郡王除婺州節度使檢校太傅翰林賈學士黯上言太傅天子師臣也子為父師於體不順中書檢勘自唐以來親王無兼師傅官者蓋自國朝命官秪以差遣為職事自三師三公以降皆是虛名故失於因循爾議者皆以賈言為當也端明殿學士五代後唐時置國朝尤以為貴多以翰林學士兼之其不以翰院兼職及换職者百年間才兩人特拜程戡王素是也慶厯八年正月十八日夜崇政殿宿衛士作亂於殿前殺傷四人取準備救火長梯登屋入禁中逢一宫人問寢閣在何處宫人不對殺之既而宿直都知聞變領宿衛士入搜索已復逃竄後三日於內城西北角樓中獲一人殺之時內臣楊懷敏受旨獲賊勿殺而倉卒殺之由是竟莫究其事葉子格者自唐中世以後有之説者云因人有姓葉號葉子青一作清或作晉者撰此格因以為名此説非也唐人藏書皆作卷軸其後有葉子其制似今策子凡文字有備檢用者卷軸難數卷舒故以葉子寫之如吳彩鸞唐韻李邰彩選之類是也骰子格本備檢用故亦以葉子寫之因以為名爾唐世士人宴聚盛行葉子格五代國初猶然後漸廢不傳今其格世或有之而無人知者惟昔楊大年好之仲待制簡大年門下客也故亦能之大年又取葉子彩一作歌名紅鶴皂鶴者别演為鶴格鄭宣徽戩章郇公得象皆大年門下客也故皆能之余少時亦有此二格後失其本今絶無知者國朝自下湖南始置諸州通判既非副二又非屬官故嘗與知州爭權每云我是監郡朝廷使我監汝舉動為其所制太祖聞而患之下詔書戒勵使與長吏協和二字一作同押凡文書非與長吏同簽書者所在不得承受施行自此遂稍稍戢然至今州郡往往與通判不和往時有錢昆少卿者家世餘杭人也杭人嗜蟹昆嘗求補外郡人問其所欲何州昆曰但得有螃蟹無通判處則可矣至今士人以為口實嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圖梅公儀同知禮部貢舉辟梅聖俞為小試官凡鎖院一有經字五十日六人者相與唱和為古律歌詩一百七十餘篇集為三卷禹玉余為校理時武成王廟所解進士也至此新科翰林與余同院又同知貢舉故禹玉贈余云十五年前出門下最榮今日預東堂余答云昔時叨入武成宫曾看揮毫氣吐虹夢寐間思十年事笑談今此一作日一樽同喜君新賜黃金𢃄顧我宜為白髮翁也天聖中余舉進士國學南省皆忝第一人薦名其後景仁相繼亦然故景仁贈余云淡墨題名第一人孤生何幸繼前塵也聖俞自天聖中與余為詩友余嘗贈以蟠桃詩有韓孟之戲故至此梅贈余云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思溫雅而敏捷皆勍敵也前此為南省試官者多窘束條制不少放懷余六人者歡然相得羣居終日長篇險韻衆製交作筆吏疲於寫録僮史一作𨽻奔走往來間以滑稽嘲謔形一作加於風刺更相酬酢往往閧堂絶倒自謂一時盛事前此未之有也往時學士循唐故事見宰相不具靴笏繫鞋坐玉堂上遣院吏計會堂頭直省官學士將至宰相出迎近時學士始具靴笏至中書與常參官雜坐於客位有移時不得見者學士日益自卑丞相禮亦漸薄蓋一作並習見已久恬然不復為怪也張堯封者南京進士也纍舉不第家甚貧有善相者謂曰視子之相不過一幕職然君骨貴必享王封人初莫曉其旨其後堯封舉進士及第終於幕職堯封溫成皇后父也后既貴堯封纍贈太師中書令兼尚書令封清河郡王由是始悟相者之言治平二年八月三日大雨一夕都城水深數尺上降詔責躬求直言學士草詔有大臣惕思天變之語上夜批出云淫雨為災專戒不德遽令除去大臣思變之言上之恭己畏天自勵如此章郇公得象與石資政中立素相友善而石喜談一作詼諧嘗戲章云昔時名畫有戴嵩牛韓幹馬而今有章得象也世言閩人多短小而長大者必為貴人郇公身既長大而語聲如鐘豈出其類者是為異人乎其為相務以厚重鎮止浮競時人稱其德量金橘産於江西以逺難致都人初不識明道景祐初一作中始與竹子俱至京師竹子味酸人不甚喜後遂不至而金橘香清味美置之樽爼間光彩灼爍一作的皪如金彈丸誠珍果也都人初亦不甚貴其後因溫成皇后尤好食之由是價重京師余世家江西見吉州人甚惜此果其欲久留者則於菉豆中藏之可經時不變云橘性熱而豆性涼故能久也凡物有相感者出於自然非人智慮所及皆因其舊俗而習知之今唐鄧間多大柿其初生澀堅實如石凡百十柿以一榠樝置其中榅桲亦可則紅熟爛如泥而可食土人謂之烘柿者非用火乃用此爾淮南人藏鹽酒蟹凡一器數十蟹以皂莢半挺置其中則可藏經歲不沙一作損至於薄荷醉貓死貓引竹之類皆世俗常知而翡翠屑金人氣粉犀此二物則世人未知者余家有一玉罌形製甚古而精巧始得之梅聖俞以為碧玉在潁州時嘗以示僚屬坐有兵馬鈐轄鄧保吉者真宗朝老內臣也識之曰此寶器也謂之翡翠云禁中寶物皆藏宜聖庫庫中有翡翠盞一隻所以識也其後豫偶以金環於罌腹信手磨之金屑紛紛而落如硯中磨墨始知翡翠之能屑金也諸藥中犀最難搗必先鎊屑乃入衆藥中搗之衆藥篩羅已盡而犀屑獨存四字一作犀獨在余偶見一醫僧元逹者解犀為小塊子方一寸半許四字一作半寸許以極薄紙裹置於一無此字懷中一有使字近肉以人氣蒸之候氣薰蒸浹洽乘熱投臼中急搗應手如粉因知人氣之能粉犀也然今醫工皆莫有知者石曼卿磊落奇才知名當世氣貌雄偉飲酒過人有劉潛者亦志義之士也常與曼卿為酒敵聞京師沙行王氏新開酒樓遂往造焉對飲終日不交一言王氏怪其所飲過多非常人之量以為異人稍獻肴果益取好酒奉之甚謹二人飲啖自若慠然不顧至夕殊無酒色相揖而去明日都下喧傳王氏酒樓有二酒仙來飲久之乃知劉石也燕龍圖肅有巧思初為永興推官知府冦萊公好舞柘枝有一鼓甚惜之其鐶忽脫公悵然以問諸匠皆莫知所為燕請以鐶腳為鎖簧內之則不脫矣萊公大喜燕為人寬厚長者博學多聞其漏刻法最精今州郡往往有之劉嶽書儀婚禮有女坐壻之馬鞍父母為之合髻之禮不知用何經義據嶽自敘云以時之所尚者益之則是當時流俗之所為爾嶽當五代干戈之際禮樂廢壞之時不暇講求三王之制度茍取一時世俗所用吉凶儀式略整齊之固不足為後世法矣然而後世猶不能行之今嶽書儀十已廢其七八其一二僅行於世者一作悉皆茍簡粗略不如本書就中轉失乖繆可為大笑者坐鞍一事爾今之士族當婚之夕以兩椅相背置一馬鞍反令壻坐其上飲以三爵女家遣人三請而後下乃成婚禮謂之上髙坐凡婚家舉族內外姻親與其男女賔客堂上堂下竦立而視者惟壻上高坐為盛禮爾或有偶不及設者則相與悵然咨嗟以為闕禮其轉失乖繆至於如此今雖名儒巨公衣冠舊族莫不皆然嗚呼士大夫不知禮義而與閭閻鄙俚同其習一作所見而不知為非者多矣前日濮園皇伯之議是已豈止坐鞍之繆哉世俗傳訛惟祠廟之名為甚今都城西崇化坊顯聖寺者本名蒲池寺周氏顯德中增廣之更名顯聖而俚俗多道其舊名今轉為菩提寺矣江南有大小孤山在江水中嶷然獨立而世一作俚俗轉孤為姑江側有一石磯謂之澎浪磯遂轉為彭郎磯云彭郎者小姑壻也余嘗過小孤山廟像乃一婦人而勑額為聖母廟豈止俚俗之繆哉西京龍門山夾伊水上自端門望之如雙闕故謂之闕塞而山口有廟曰闕口廟余嘗見其廟像甚勇手持一屠刀尖鋭按膝而坐問之云此乃豁口大王也此尤可笑者爾今世俗言語之訛而舉世君子小人皆同其繆者惟打字爾打丁雅反其義本謂考擊故人相毆以物相擊皆謂之打而工造金銀器亦謂之打可矣蓋有槌撾作擊之義也至於造舟車者曰打船打車網魚曰打魚汲水曰打水投夫餉飯曰打飯兵士給衣糧曰打衣糧從者執傘曰打傘以糊黏紙曰打黏以丈尺量地曰打量舉手試眼之昏明曰打試至於名儒碩學語皆如此觸事皆謂之打而遍檢字書了無此字丁雅反者其義主考擊之打自音謫疑當作滴耿以字學言之打字從手從丁丁又擊物之聲故音謫耿為是不知因何轉為丁雅也用錢之法自五代以來以七十七為百謂之省陌今市井交易又尅其五謂之依除咸平五年陳恕知貢舉選士最精所解七十二人王沂公曾為第一御試又落其半而及第者三十八人沂公又為第一故京師為語曰南省解一百依除殿前放五十省陌也是歲取人雖少得士最多宰相三人乃沂公與王公隨章公得象參知政事一人韓公億侍讀學士一人李仲容御史中丞一人王臻知制誥一人陳知微而汪白青楊楷二人雖不逹而皆以文學知名當世唐李肇國史補序云言報應敘鬼神述夢卜近帷箔悉去之紀事實探物理辨疑惑示勸戒採風俗助談笑則書之余之所録大抵以肇為法六字一作亦然而小異於肇者不書人之過惡以為職非史官而掩惡揚善者君子之志也覽者詳之歸田録卷下
